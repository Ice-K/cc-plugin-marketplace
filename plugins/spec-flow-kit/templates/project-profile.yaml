# 项目画像配置。
#
# 文件用途：记录项目类型、主要语言、包管理器、质量检查命令、规则文件入口和环境信息。
# 读取者：/sfk-design、/sfk-plan、/sfk-development、/sfk-verify、/sfk-deploy、/sfk-audit 会按需读取。
# 维护方式：/sfk-init 会尽量自动探测并只填补空值；用户应在初始化后确认和修正 unknown 或 null 字段。
# 安全约束：/sfk-init 不会自动运行 install、lint、typecheck、test、build 或 deploy 命令。
#
# 固定或建议取值：
# - project.type 建议值：unknown、web-api、frontend-app、fullstack-app、cli、library、service、monorepo、other。
#   - unknown：尚未确认项目类型。
#   - web-api：后端 HTTP/API 服务。
#   - frontend-app：前端应用。
#   - fullstack-app：同时包含前端和后端的应用。
#   - cli：命令行工具。
#   - library：库或 SDK。
#   - service：后台服务、worker 或 daemon。
#   - monorepo：多包或多项目仓库。
#   - other：不属于以上类型。
# - project.language 建议值：unknown、javascript、typescript、python、go、java、rust、csharp、other。
#   - unknown：尚未确认主要语言。
#   - javascript/typescript/python/go/java/rust/csharp：对应主要语言。
#   - other：主要语言不在上述列表中。
# - project.packageManager 建议值：unknown、pnpm、npm、yarn、bun、pip、uv、poetry、go、maven、gradle、cargo、dotnet、other。
#   - unknown：尚未确认包管理器。
#   - pnpm/npm/yarn/bun：JavaScript/TypeScript 包管理器。
#   - pip/uv/poetry：Python 包管理器。
#   - go：Go module 工具链。
#   - maven/gradle：Java/JVM 构建工具。
#   - cargo：Rust 包管理器。
#   - dotnet：.NET CLI。
#   - other：其他包管理或构建工具。
# - commands.*：本地质量检查命令；null 表示未配置。/sfk-verify 可用这些命令生成 evidence。
# - rules.files：规则正文文件入口；应与 rules.yaml 中的 source 字段保持同步。
# - requiresApproval: true 表示执行前必须获得用户显式确认；false 表示不额外要求环境级确认，但命令自身仍可要求确认。
# - production.deploy: manual 表示只生成部署说明或 runbook，不自动部署。

version: 1 # 文件协议版本，当前保持为 1。

project:
  name: null # 项目名称；例如 my-service。无法自动识别时可手动填写。
  type: unknown # 项目类型；例如 web-api、frontend-app、cli、library。
  language: unknown # 主要语言；例如 typescript、python、go、java。
  packageManager: unknown # 包管理器；例如 pnpm、npm、yarn、pip、uv、go、maven。

commands:
  install: null # 安装依赖命令；例如 pnpm install。MVP 默认不会自动运行。
  lint: null # 静态检查命令；例如 pnpm lint。
  typecheck: null # 类型检查命令；例如 pnpm typecheck。
  unitTest: null # 单元测试命令；例如 pnpm test。
  build: null # 构建命令；例如 pnpm build。
  e2e: null # 端到端测试命令；例如 pnpm test:e2e。

rules:
  # 项目规则文件列表，是后续命令加载规则正文的入口。
  # /sfk-design、/sfk-plan、/sfk-development、/sfk-verify 和 /sfk-audit 会按需读取这些文件。
  # 如果用户新增、删除或重命名 rules/*.md，/sfk-rules-sync 应同步维护这里。
  # 插件不应无提示删除用户手动添加且文件仍存在的条目。
  files:
    - .spec-flow-kit/rules/engineering-structure.md
    - .spec-flow-kit/rules/development-process.md
    - .spec-flow-kit/rules/coding-style.md
    - .spec-flow-kit/rules/testing-rules.md

environments:
  local:
    run: null # 本地启动命令；例如 pnpm dev。
    verify: null # 本地快速验证命令；例如 pnpm test。

  staging:
    deploy: null # staging 部署命令；MVP 不自动执行。
    verify: null # staging 验证命令；例如 smoke test。
    requiresApproval: true # 是否需要用户显式确认。

  production:
    deploy: manual # production 默认 manual，表示只生成 runbook，不自动执行。
    requiresApproval: true # production 必须显式确认。
    rollback: null # 回滚命令或 runbook 路径。
