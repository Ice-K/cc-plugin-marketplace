# spec-flow-kit 默认 SDD 流程定义。
#
# 文件用途：定义 spec-flow-kit 默认 SDD 阶段流转、每个阶段对应的 slash command、阶段 gate 和推荐下一步。
# 读取者：/sfk-status、/sfk-next、/sfk-init 和需要展示流程的命令会读取此文件。
# 维护方式：用户通常不需要修改；只有团队明确要调整阶段顺序、增删阶段或替换命令时才编辑。
#
# 字段说明：
# - name：流程名称，可按团队习惯修改。
# - version：文件协议版本；当前保持为 1。
# - stages[]：阶段列表，按执行顺序排列。
# - stages[].id 固定阶段：init、requirements、use、design、plan、development、verification、status。
#   - init：初始化 .spec-flow-kit 工作区。
#   - requirements：创建或更新 feature requirements。
#   - use：选择 active feature。
#   - design：创建系统设计、ADR 和测试计划。
#   - plan：拆分任务并初始化 traceability。
#   - development：实现任务并更新 traceability。
#   - verification：验证验收标准并记录 evidence。
#   - status：查询状态、缺口和下一步。
# - stages[].name：阶段显示名称。
# - stages[].command：阶段对应 slash command，例如 /sfk-design。
# - stages[].gate：进入下一阶段前应满足的 gate；gate: null 表示该阶段是查询或辅助阶段，不需要 gate。
# - stages[].next：推荐下一阶段；next: null 表示流程终点。
#
# 修改注意：修改阶段顺序、gate 名称或 command 时，需要同步 gates.json 和相关 /sfk-* 命令预期。

name: default-sdd-flow # 流程名称，可按团队习惯修改。
version: 1 # 文件协议版本，当前保持为 1。

stages:
  # 初始化 .spec-flow-kit 工作区。
  - id: init
    name: 初始化 spec-flow-kit 工作区
    command: /sfk-init
    gate: initialized
    next: requirements

  # 从自然语言需求生成 feature requirements，并默认激活该 feature。
  - id: requirements
    name: 需求分析
    command: /sfk-requirements
    gate: requirements-ready
    next: design

  # 切换 active feature。该阶段不修改业务代码，只更新 state.json。
  - id: use
    name: 选择 active feature
    command: /sfk-use
    gate: active-feature-selected
    next: design

  # 基于需求、项目上下文和 rules 生成设计、ADR 和测试计划。
  - id: design
    name: 系统设计
    command: /sfk-design
    gate: design-ready
    next: plan

  # 将设计拆分为任务，并初始化 traceability。
  - id: plan
    name: 任务拆分
    command: /sfk-plan
    gate: plan-ready
    next: development

  # 按任务实现代码和测试，并更新 traceability。
  - id: development
    name: 代码实现
    command: /sfk-development
    gate: development-ready
    next: verification

  # 对照验收标准验证实现，并记录 evidence。
  - id: verification
    name: 验证
    command: /sfk-verify
    gate: verification-passed
    next: status

  # 查看当前状态、阻塞项、traceability 缺口和下一步。
  - id: status
    name: 状态汇总
    command: /sfk-status
    gate: null # status 只是查询命令，不需要 gate。
    next: null
